{% extends 'crm/base.html' %}
{% block title %}Удаление{% endblock %}
{% block content %}
<div class="panel">
  <div class="panel-head"><h2>Удалить запись?</h2></div>
  <p style="color:#c7d1dc">Вы действительно хотите удалить: <strong>{{ object }}</strong>?</p>
  <form method="post" class="top-actions" style="margin-top:20px">
    {% csrf_token %}
    <button class="btn danger" type="submit">Удалить</button>
    <a class="btn ghost" href="{% url back_url %}">Отмена</a>
  </form>
</div>
{% endblock %}
