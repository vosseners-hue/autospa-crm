{% extends 'crm/base.html' %}{% block content %}<h2>Склад</h2><p><a class="btn" href="/admin/crm/material/add/">Добавить материал</a></p><table><tr><th>Материал</th><th>Остаток</th><th>Мин.</th><th>Себестоимость</th></tr>{% for m in materials %}<tr {% if m.stock <= m.min_stock %}class="bad"{% endif %}><td>{{m.name}}</td><td>{{m.stock}} {{m.get_unit_display}}</td><td>{{m.min_stock}}</td><td>{{m.cost}} ₽</td></tr>{% endfor %}</table>{% endblock %}
