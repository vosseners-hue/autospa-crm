services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: nextline
      POSTGRES_USER: nextline
      POSTGRES_PASSWORD: nextline_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: .
    restart: always
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn nextline.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_data:/app/staticfiles
      - /var/www/autospa-media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
volumes:
  postgres_data:
  static_data:
